<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OC Dialer — Login</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OC Dialer">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --text2: #999;
    --text3: #666;
    --accent: #4f8ef7;
    --accent-dim: #1e3a6e;
    --red: #f87171;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .login-brand {
    text-align: center;
  }

  .brand-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .brand-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .brand-name span { color: var(--accent); }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }

  .btn-login {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
    margin-top: 4px;
    min-height: 44px;
  }

  .btn-login:hover { background: #3b7de8; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    display: none;
    background: #2a0d0d;
    border: 1px solid #5a1a1a;
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--red);
  }

  .error-msg.show { display: block; }

  .login-footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <div class="brand-label">Sales Tool</div>
    <div class="brand-name">OC <span>Dialer</span></div>
  </div>

  <div class="login-card">
    <div class="card-title">Sign in to your account</div>

    <form id="login-form" novalidate>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autocapitalize="none" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      </div>
    </form>
  </div>

  <div class="login-footer">OC Landscaping · Calls route through your iPhone via Continuity</div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

// If already logged in, redirect immediately
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) redirectByRole(session.user.id);
})();

async function redirectByRole(userId) {
  const { data: meta } = await sb
    .from('users_meta')
    .select('role')
    .eq('id', userId)
    .single();
  if (meta?.role === 'admin') {
    window.location.href = '/dashboard.html';
  } else {
    window.location.href = '/dialer.html';
  }
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = error.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
    return;
  }

  await redirectByRole(data.user.id);
});
</script>
</body>
</html>
